<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGE WITH ANDRE | FULL EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap');

        :root {
            --accent: #bc13fe; /* Фиолетовый неон */
            --blue: #00f2ff;
            --green: #00ff88;
            --bg: #0b021a; /* Глубокий темный фиолетовый */
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* НАЧАЛЬНЫЙ ЭКРАН */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #start-screen.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
        }

        #start-screen h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, var(--accent), var(--blue));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-align: center;
        }

        .start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
            text-transform: uppercase;
        }

        .start-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 40px var(--accent);
            transform: translateY(-5px);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .app-container {
            display: none;
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #fff, var(--blue), #fff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 40px 0;
            background: var(--glass);
            padding: 8px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #fff;box-shadow: 0 0 15px var(--accent);
        }

        .content-section {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 20px;
        }

        .content-section.active {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transition: 0.3s;
        }

        .card:hover { border-color: var(--blue); }

        .type-label {
            display: inline-block;
            background: rgba(0, 242, 255, 0.1);
            color: var(--blue);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .q-text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; display: block; }

        .input-group { display: flex; gap: 10px; }
        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .check-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .feedback.correct { border: 1px solid var(--green); background: rgba(0, 255, 136, 0.05); color: var(--green); }
        .feedback.wrong { border: 1px solid #ff4444; background: rgba(255, 68, 68, 0.05); color: #ff4444; }

        .poyas { display: block; margin-top: 10px; color: #aaa; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @media (max-width: 600px) {
            .tabs { flex-direction: column; width: 100%; }
            #start-screen h1 { font-size: 2.5rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>OGE WITH ANDRE</h1>
    <button class="start-btn" onclick="startApp()">Начать решать задания</button>
</div>

<div class="app-container" id="main-app">
    <header>
        <h1>GEOGRAPHY PREP</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('classic')">Классика (16-50)</button>
        <button class="tab-btn" onclick="switchTab('oge30')">Все 30 типов ОГЭ</button>
    </div>

    <div id="classic-list" class="content-section active"></div>
    <div id="oge-list" class="content-section"></div>
</div>

<script>
    // ВСЕ 35 ВОПРОСОВ (16-50)
    const classicData = [
        { id: 16, q: "Самый населённый город России (без учёта Москвы)?", a: ["санкт-петербург", "питер", "спб"], p: "Питер (~5,6 млн). Москва лидер (~13 млн)." },
        { id: 17, q: "Что такое урбанизация? Регион РФ с самым высоким уровнем?", a: ["мурманская"], p: "Мурманская область — 92%." },
        { id: 18, q: "В каком субъекте РФ самая низкая плотность населения?", a: ["чукотский", "чукотка"], p: "Чукотский АО (менее 0,1 чел/км²)." },
        { id: 19, q: "Ведущая отрасль топливной промышленности России?", a: ["нефтяная", "газовая"], p: "Основа экспорта РФ." },{ id: 20, q: "Город — «угольная столица» России?", a: ["новокузнецк"], p: "Центр Кузбасса." },
        { id: 21, q: "Соответствие: 1-Тольятти, 2-Н.Новгород, 3-Калуга (ГАЗ, АвтоВАЗ, VW)", a: ["1б 2а 3в", "бав"], p: "1-АвтоВАЗ, 2-ГАЗ, 3-VW." },
        { id: 22, q: "Где развито алюминиевое производство и почему?", a: ["сибирь", "красноярский"], p: "Дешевая энергия ГЭС в Сибири." },
        { id: 23, q: "Три города — центра чёрной металлургии полного цикла?", a: ["магнитогорск", "череповец", "новокузнецк"], p: "Магнитка, Череп, Кузня." },
        { id: 24, q: "Почему в Поволжье развито машиностроение?", a: ["транспорт", "волга"], p: "Положение на Волге и ресурсы." },
        { id: 25, q: "Три субъекта РФ, где выращивают рис?", a: ["краснодарский", "ростовская", "астраханская"], p: "Кубань — главный рисовод." },
        { id: 26, q: "Крайняя северная точка России?", a: ["флигели"], p: "Мыс Флигели (островная)." },
        { id: 27, q: "Река, впадающая в Каспийское море?", a: ["волга"], p: "Крупнейшая в Европе." },
        { id: 28, q: "Субъект: ПФО, столица Казань, тюрки?", a: ["татарстан"], p: "Республика Татарстан." },
        { id: 29, q: "Три города-миллионера на Волге?", a: ["казань", "самара", "волгоград", "нижний"], p: "Н.Новгород, Казань, Самара, Волгоград." },
        { id: 30, q: "Центры АЭС: Смоленск, Курск, Тверь, Воронеж, Балаково (выбрать 3)?", a: ["курск", "смоленск", "балаково"], p: "Курск, Смоленск, Балаково." },
        { id: 31, q: "Океан, в котором находится Сахалин?", a: ["тихий"], p: "Тихий океан." },
        { id: 32, q: "Самое глубокое озеро мира?", a: ["байкал"], p: "Байкал (1642 м)." },
        { id: 33, q: "Самая длинная сухопутная граница РФ?", a: ["казахстан"], p: "Граница с Казахстаном (>7500 км)." },
        { id: 34, q: "Самый высокий действующий вулкан Евразии?", a: ["ключевская"], p: "Ключевская Сопка на Камчатке." },
        { id: 35, q: "Пролив между Тихим и Сев. Ледовитым океанами?", a: ["берингов"], p: "Берингов пролив." },
        { id: 36, q: "Область с самой западной точкой страны?", a: ["калининградская"], p: "Балтийская коса." },
        { id: 37, q: "Самый большой остров России?", a: ["сахалин"], p: "Остров Сахалин." },
        { id: 38, q: "Природная зона с самой большой площадью в РФ?", a: ["тайга"], p: "Хвойные леса." },
        { id: 39, q: "Столица Якутии?", a: ["якутск"], p: "Якутск." },
        { id: 40, q: "Самое мелкое море в мире?", a: ["азовское"], p: "Глубина до 13.5 м." },
        { id: 41, q: "Основной климатический пояс России?", a: ["умеренный"], p: "Большая часть РФ." },
        { id: 42, q: "Горы между Европой и Азией?", a: ["уральские", "урал"], p: "Уральские горы." },
        { id: 43, q: "Город — 'порт пяти морей'?", a: ["москва"], p: "Благодаря каналам." },
        { id: 44, q: "Регион — 'янтарный край'?", a: ["калининградская"], p: "Добыча янтаря." },
        { id: 45, q: "Высшая точка России?", a: ["эльбрус"], p: "Гора Эльбрус (5642 м)." },
        { id: 46, q: "Море, где остров Новая Земля?", a: ["баренцево", "карское"], p: "На стыке двух морей." },
        { id: 47, q: "Самая длинная река в России (с Иртышом)?", a: ["обь"], p: "Обь-Иртыш." },
        { id: 48, q: "Центр судостроения на Балтике?", a: ["санкт-петербург"], p: "Питерские верфи." },
        { id: 49, q: "Регион-лидер по добыче газа?", a: ["ямало-ненецкий", "ямал"], p: "ЯНАО — газовое сердце." },
        { id: 50, q: "Незамерзающий порт за Полярным кругом?", a: ["мурманск"], p: "Порт Мурманск (Гольфстрим)." }
    ];

    // ВСЕ 30 ТИПОВ ОГЭ ПО PDF
    const oge30Data = [
        { id: 1, type: "Общая география", q: "Кто первым открыл Южный полюс?", a: ["амундсен"], p: "Руаль Амундсен (1911)." },
        { id: 2, type: "Границы РФ", q: "С какой страной у РФ самая длинная сухопутная граница?", a: ["казахстан"], p: "Граница с Казахстаном." },{ id: 3, type: "Климат", q: "Расположите: Псков, Тюмень, Красноярск (в порядке роста континентальности).", a: ["псков тюмень красноярск"], p: "Чем дальше на восток, тем выше континентальность." },
        { id: 4, type: "Заповедники", q: "В каком регионе находится Баргузинский заповедник?", a: ["бурятия"], p: "Республика Бурятия (Байкал)." },
        { id: 5, type: "Синоптика", q: "Область высокого давления, приносящая ясную погоду?", a: ["антициклон"], p: "Антициклон = Ясно." },
        { id: 6, type: "Погода", q: "В каком городе ожидается похолодание, если к нему идет холодный фронт?", a: ["вопрос по карте"], p: "Смотри по направлению 'зубчиков' на карте." },
        { id: 7, type: "Координаты", q: "Объект с координатами 43° с.ш. 42° в.д.?", a: ["эльбрус"], p: "Гора Эльбрус." },
        { id: 8, type: "Геохронология", q: "Расположите слои от самого древнего до самого молодого.", a: ["снизу вверх"], p: "Древние слои всегда в самом низу." },
        { id: 9, type: "Расстояние", q: "Как вычислить расстояние на карте, если масштаб 1:10000?", a: ["умножить"], p: "В 1 см — 100 метров." },
        { id: 10, type: "Направление", q: "В каком направлении от точки А находится родник?", a: ["север", "юг", "запад", "восток"], p: "Используй стрелку С-Ю." },
        { id: 11, type: "Профиль", q: "Как называется чертеж, показывающий разрез рельефа?", a: ["профиль"], p: "Профиль рельефа местности." },
        { id: 12, type: "Выбор участка", q: "Участок для сада должен быть на каком склоне?", a: ["южном"], p: "Южный склон быстрее прогревается." },
        { id: 13, type: "Задачи", q: "На сколько упадет температура при подъеме на 2000 метров?", a: ["12"], p: "Минус 6 градусов на каждый километр." },
        { id: 14, type: "Стихии", q: "В каком регионе России наиболее вероятны землетрясения?", a: ["камчатка", "курилы", "кавказ"], p: "Зоны сейсмической активности." },
        { id: 15, type: "Экология", q: "Создание террас на склонах — это рационально?", a: ["да", "рационально"], p: "Да, это защищает почву от размыва." },
        { id: 16, type: "Таблицы", q: "В каком регионе самый высокий естественный прирост?", a: ["по таблице"], p: "Рождаемость минус Смертность." },
        { id: 17, type: "Статистика", q: "Чему равен миграционный прирост?", a: ["прибывшие", "выбывшие"], p: "Прибывшие минус Выбывшие." },
        { id: 18, type: "Половозрастная", q: "Кого больше в возрасте 70 лет по пирамиде?", a: ["женщин"], p: "В России женщины живут дольше." },
        { id: 19, type: "Часовые пояса", q: "Во сколько вылетел самолет, если разница +2 часа?", a: ["задача на время"], p: "Считай разницу между зонами." },
        { id: 20, type: "Слоганы", q: "Слоган: 'Посетите край янтаря!'. О каком регионе речь?", a: ["калининградская"], p: "Янтарный край." },
        { id: 21, type: "Термины", q: "Процесс роста городов и городского населения?", a: ["урбанизация"], p: "Это урбанизация." },
        { id: 22, type: "Ресурсы", q: "Крупнейшее месторождение железа в РФ?", a: ["кма"], p: "Курская Магнитная Аномалия." },
        { id: 23, type: "Отрасли", q: "Где находится завод КАМАЗ?", a: ["набережные челны"], p: "Татарстан." },
        { id: 24, type: "Крупные города", q: "Город-миллионер в Сибири на Оби?", a: ["новосибирск"], p: "Новосибирск." },
        { id: 25, type: "Народы", q: "Буддизм в России исповедуют калмыки и...?", a: ["буряты", "тувинцы"], p: "Бурятия, Тыва, Калмыкия." },
        { id: 26, type: "Плотность", q: "В каком районе плотность выше: Центральная Россия или Сибирь?", a: ["центральная"], p: "Основная полоса расселения." },
        { id: 27, type: "Текст (Регион)", q: "Определите субъект по описанию.", a: ["по тексту"], p: "Ищи ключевые слова (реки, горы)." },
        { id: 28, type: "Текст (Страна)", q: "Определите страну по описанию.", a: ["по тексту"], p: "Ищи столицу или соседа." },
        { id: 29, type: "Текст (Задание)", q: "Почему в этом регионе развита деревообработка?", a: ["леса", "реки"], p: "Наличие сырья и воды." },{ id: 30, type: "Описание", q: "Порт на Баренцевом море, центр атомного судостроения.", a: ["северодвинск", "мурманск"], p: "Обычно это Мурманск или Северодвинск." }
    ];

    function startApp() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('main-app').style.display = 'flex';
    }

    function render(data, containerId, isOge = false) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${containerId}-${item.id}`;
            card.innerHTML = `
                ${isOge ? `<div class="type-label">Тип ${item.id}: ${item.type}</div>` : `<div class="type-label">№ ${item.id}</div>`}
                <span class="q-text">${item.q}</span>
                <div class="input-group">
                    <input type="text" placeholder="Ответ..." id="in-${containerId}-${item.id}">
                    <button class="check-btn" onclick="check('${containerId}', '${item.id}')">OK</button>
                </div>
                <div class="feedback" id="f-${containerId}-${item.id}"></div>
            `;
            container.appendChild(card);
        });
    }

    window.check = function(cId, id) {
        const val = document.getElementById(`in-${cId}-${id}`).value.toLowerCase().trim();
        const f = document.getElementById(`f-${cId}-${id}`);
        const card = document.getElementById(`card-${cId}-${id}`);
        const dataSet = cId === 'classic-list' ? classicData : oge30Data;
        const q = dataSet.find(x => x.id == id);
        
        const ok = q.a.some(a => val.includes(a));
        f.style.display = 'block';
        card.classList.remove('shake');

        if(ok && val !== "") {
            f.className = 'feedback correct';
            f.innerHTML = `<strong>👍 ВЕРНО!</strong><br><span class="poyas">${q.p}</span>`;
        } else {
            card.classList.add('shake');
            f.className = 'feedback wrong';
            f.innerHTML = `<strong>💔 ОШИБКА.</strong> Ответ: ${q.a[0]}<br><span class="poyas">${q.p}</span>`;
        }
    };

    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        if(tab === 'classic') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('classic-list').classList.add('active');
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('oge-list').classList.add('active');
        }
    };

    render(classicData, 'classic-list');
    render(oge30Data, 'oge-list', true);
</script>

</body>
</html>
