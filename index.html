<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGE WITH ANDRE | LEGENDARY EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap');

        :root {
            --red: #ff3c3c;
            --green: #00ff88;
            --blue: #00f2ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 60, 60, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 12px;
            /* Исправленный блок с градиентным текстом */
            background: linear-gradient(90deg, #fff, var(--red), #fff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: var(--red); /* Цвет на случай, если градиент не подгрузится */
            filter: drop-shadow(0 0 20px rgba(255, 60, 60, 0.6));
            font-weight: 900;
        }

        header p {
            color: var(--red);
            letter-spacing: 4px;
            font-weight: 600;
            margin-top: 10px;
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            padding: 15px 30px;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.4s ease;
            border-radius: 15px;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 60, 60, 0.4);
        }

        .content-section {
            display: none;
            width: 100%;
            max-width: 900px;
            flex-direction: column;
            gap: 25px;
        }

        .content-section.active {
            display: flex;
            animation: scaleUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 35px;
            transition: 0.4s;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card:hover {
            border-color: var(--red);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
        }

        .q-type {
            position: absolute;
            top: 20px;
            right: 25px;
            color: var(--red);
            font-weight: 900;
            font-size: 1.5rem;
            opacity: 0.2;
        }

        .q-text {
            font-size: 1.4rem;margin-bottom: 25px;
            line-height: 1.5;
            display: block;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--border);
            padding: 18px;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .check-btn {
            background: var(--red);
            border: none;
            color: #fff;
            padding: 0 35px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .check-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--red);
        }

        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 18px;
            display: none;
            font-size: 1.1rem;
            animation: slideIn 0.4s ease;
        }

        .feedback.correct {
            border: 2px solid var(--green);
            background: rgba(0, 255, 136, 0.05);
            color: var(--green);
        }

        .feedback.wrong {
            border: 2px solid var(--red);
            background: rgba(255, 60, 60, 0.05);
            color: var(--red);
        }

        .poyas {
            display: block;
            margin-top: 12px;
            color: #ccc;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            line-height: 1.6;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .pulse { animation: pulse 0.5s ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        @media (max-width: 600px) {
            .tabs { flex-direction: column; width: 100%; }
            .input-group { flex-direction: column; }
            .check-btn { padding: 18px; }
        }
    </style>
</head>
<body>

<header>
    <h1>OGE WITH ANDRE</h1>
    <p>ULTIMATE GEOGRAPHY SYSTEM</p>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('main')">Классика (16-50)</button>
    <button class="tab-btn" onclick="switchTab('oge')">Все типы ОГЭ (1-30)</button>
</div>

<div id="section-main" class="content-section active"></div>
<div id="section-oge" class="content-section"></div>

<script>
    const mainData = [
        { id: 16, q: "Какой город России самый населённый (без учёта Москвы)?", a: ["санкт-петербург", "питер", "спб"], p: "Санкт-Петербург (~5,6 млн). Москва — лидер." },
        { id: 17, q: "Что такое урбанизация? И какой регион РФ самый урбанизированный?", a: ["мурманская"], p: "Мурманская область (92%) — суровый север диктует жизнь в городах." },
        { id: 18, q: "Где в РФ самая низкая плотность населения?", a: ["чукотский", "чукотка"], p: "Чукотка: менее 0,1 чел/км²." },{ id: 23, q: "Три города — центра чёрной металлургии полного цикла?", a: ["магнитогорск", "череповец", "новокузнецк"], p: "Металлургическая база России." },
        { id: 32, q: "Самое глубокое озеро в мире?", a: ["байкал"], p: "Байкал — глубина 1642 м." },
        { id: 45, q: "Высшая точка России?", a: ["эльбрус"], p: "Эльбрус (5642 м)." },
        { id: 50, q: "Незамерзающий порт за Полярным кругом?", a: ["мурманск"], p: "Мурманск. Омывается теплым течением." }
    ];

    const ogeData = [
        { id: "Тип 1", q: "Кто первым достиг Южного полюса?", a: ["амундсен"], p: "Руаль Амундсен опередил Скотта в 1911 году." },
        { id: "Тип 2", q: "Самая длинная сухопутная граница РФ с какой страной?", a: ["казахстан"], p: "Граница с Казахстаном растянулась на 7500+ км." },
        { id: "Тип 3", q: "В каком порядке растет континентальность: Псков, Тюмень, Красноярск?", a: ["псков тюмень красноярск"], p: "Континентальность растет при движении на восток." },
        { id: "Тип 5", q: "Ясная и морозная погода зимой — это циклон или антициклон?", a: ["антициклон"], p: "Антициклон приносит высокое давление и ясное небо." },
        { id: "Тип 13", q: "На сколько градусов холодает при подъеме на каждые 1000 метров?", a: ["6"], p: "Вертикальный температурный градиент — 6 градусов на км." },
        { id: "Тип 15", q: "Создание террас на склонах — это рационально или нет?", a: ["рационально", "да"], p: "Да, это защищает почву от эрозии." },
        { id: "Тип 30", q: "Город на Волге, миллионер, центр автопрома (ГАЗ)?", a: ["нижний новгород"], p: "Это Нижний Новгород." }
    ];

    function render(data, containerId) {
        const container = document.getElementById(containerId);
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${item.id}`;
            card.innerHTML = `
                <div class="q-type">${item.id}</div>
                <span class="q-text">${item.q}</span>
                <div class="input-group">
                    <input type="text" placeholder="Ответ..." id="in-${item.id}" onkeypress="handleEnter(event, '${item.id}')">
                    <button class="check-btn" onclick="check('${item.id}')">OK</button>
                </div>
                <div class="feedback" id="f-${item.id}"></div>
            `;
            container.appendChild(card);
        });
    }

    function handleEnter(e, id) { if(e.key === 'Enter') check(id); }

    window.check = function(id) {
        const val = document.getElementById('in-' + id).value.toLowerCase().trim();
        const f = document.getElementById('f-' + id);
        const card = document.getElementById(`card-${id}`);
        const q = [...mainData, ...ogeData].find(x => x.id == id);
        
        const ok = q.a.some(a => val.includes(a));
        f.style.display = 'block';
        card.classList.remove('shake', 'pulse');

        if(ok && val !== "") {
            card.classList.add('pulse');
            f.className = 'feedback correct';
            f.innerHTML = `<strong>👍 ВЕРНО!</strong><br><span class="poyas">${q.p}</span>`;
        } else {
            card.classList.add('shake');
            f.className = 'feedback wrong';
            f.innerHTML = `<strong>💔 ОШИБКА.</strong> Ответ: ${q.a[0]}<br><span class="poyas">${q.p}</span>`;
        }
    };

    window.switchTab = function(t) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        if(t === 'main') {
            document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
            document.getElementById('section-main').classList.add('active');
        } else {
            document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
            document.getElementById('section-oge').classList.add('active');
        }
    };render(mainData, 'section-main');
    render(ogeData, 'section-oge');
</script>

</body>
</html>
